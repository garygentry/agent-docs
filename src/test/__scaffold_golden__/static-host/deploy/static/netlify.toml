# netlify.toml — generated by doc-site-plugin.
# Env-driven SITE/BASE_PATH (REQ-CORE-02/DEPLOY-02); root-hosted by default.
# `command` shows the Bun+pnpm form; the agent swaps `pnpm`->`npm run` per
# npm (06 §5.3). With `base` set, the build runs package-local, so no
# --filter/--workspace is needed regardless of monorepo vs single.

[build]
  base = "site"
  command = "pnpm build"
  publish = "dist"

[build.environment]
  SITE = "https://static.example.net"
  BASE_PATH = "/docs"
